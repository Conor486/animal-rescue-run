<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Animal Rescue Run! 🐾</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐾</text></svg>">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1a2e;touch-action:none}
#game-container{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>
<div id="game-container"></div>
<script>
const LEVELS = [
  { name:'Sunny Meadow', sky:0x87CEEB, ground:0x5a9c3e, groundTop:0x7bc95e, dirt:0x8B6914,
    animals:['🐰','🦊','🐦'], animalNames:['Bunny','Fox','Bird'], enemies:['slime'],
    required:5, length:3500 },
  { name:'Mystic Forest', sky:0x2e4a2e, ground:0x3a5a2e, groundTop:0x4a7a3a, dirt:0x4a3728,
    animals:['🦊','🐱','🐦'], animalNames:['Fox','Cat','Bird'], enemies:['slime','bat'],
    required:6, length:4200 },
  { name:'Crystal Caves', sky:0x0d0d2b, ground:0x3d3d6a, groundTop:0x5050aa, dirt:0x2a2a4a,
    animals:['🐸','🐱','🐼'], animalNames:['Frog','Cat','Panda'], enemies:['bat','spike'],
    required:7, length:4800 },
  { name:'Snowy Peaks', sky:0xb8d4e3, ground:0xdde8f2, groundTop:0xf0f5fa, dirt:0xc0d0e0,
    animals:['🐧','🐰','🐼'], animalNames:['Penguin','Bunny','Panda'], enemies:['spike','bat'],
    required:7, length:5000 },
  { name:'Volcano Island', sky:0x5a2a10, ground:0x6a3a22, groundTop:0x7a4a32, dirt:0x4a2a1a,
    animals:['🦜','🐸','🦊'], animalNames:['Parrot','Frog','Fox'], enemies:['slime','bat','spike'],
    required:9, length:5800 },
];

class BootScene extends Phaser.Scene {
  constructor(){ super('Boot'); }
  create(){
    var g = this.make.graphics({add:false});

    // Player spritesheet 4 frames
    g.clear();
    for(var f=0;f<4;f++){
      var ox=f*32;
      g.fillStyle(0xe74c3c); g.fillRect(ox+10,16,12,8);
      g.fillStyle(0xffcc99); g.fillCircle(ox+16,11,7);
      g.fillStyle(0x8B4513); g.fillRect(ox+9,3,14,5);
      g.fillStyle(0x222222); g.fillCircle(ox+14,10,1.5); g.fillCircle(ox+19,10,1.5);
      g.fillStyle(0xc0392b); g.fillTriangle(ox+10,16, ox+5-(f%2)*2,26, ox+12,24);
      g.fillStyle(0x3498db);
      var lo = f===1?-1:f===2?1:0;
      g.fillRect(ox+11,22,4,6+lo); g.fillRect(ox+17,22,4,6-lo);
      g.fillStyle(0x5d4037); g.fillRect(ox+10,28+lo,5,3); g.fillRect(ox+17,28-lo,5,3);
      g.fillStyle(0xf39c12); g.fillRect(ox+10,21,12,1);
    }
    g.generateTexture('player_sheet',128,32);

    LEVELS.forEach(function(l,i){
      g.clear();
      g.fillStyle(l.dirt); g.fillRect(0,0,32,32);
      g.fillStyle(l.ground); g.fillRect(0,0,32,10);
      g.fillStyle(l.groundTop); g.fillRect(0,0,32,5);
      g.generateTexture('tile_'+i,32,32);
      g.clear();
      g.fillStyle(l.dirt); g.fillRect(0,0,32,16);
      g.fillStyle(l.ground); g.fillRect(0,0,32,8);
      g.fillStyle(l.groundTop); g.fillRect(0,0,32,4);
      g.generateTexture('plat_'+i,32,16);
    });

    g.clear(); g.fillStyle(0x8bc34a); g.fillCircle(14,14,10); g.fillStyle(0x689f38); g.fillCircle(14,18,8);
    g.fillStyle(0xffffff); g.fillCircle(10,11,3); g.fillCircle(18,11,3);
    g.fillStyle(0x333333); g.fillCircle(11,11,1.5); g.fillCircle(19,11,1.5);
    g.generateTexture('enemy_slime',28,28);

    g.clear(); g.fillStyle(0x9c27b0); g.fillEllipse(4,14,10,14); g.fillEllipse(24,14,10,14);
    g.fillStyle(0x7b1fa2); g.fillCircle(14,14,7);
    g.fillStyle(0xff5722); g.fillCircle(11,12,2); g.fillCircle(17,12,2);
    g.fillStyle(0xffffff); g.fillRect(12,18,1,3); g.fillRect(15,18,1,3);
    g.generateTexture('enemy_bat',28,28);

    g.clear(); g.fillStyle(0xb71c1c); g.fillCircle(14,14,10);
    g.fillStyle(0xf44336); g.fillCircle(14,14,7);
    g.fillStyle(0xffffff); g.fillCircle(11,12,2); g.fillCircle(17,12,2);
    g.fillStyle(0x333333); g.fillCircle(12,12,1); g.fillCircle(18,12,1);
    g.generateTexture('enemy_spike',28,28);

    g.clear(); g.fillStyle(0xffd700); g.fillCircle(8,8,6); g.fillStyle(0xffeb3b); g.fillCircle(7,6,3);
    g.generateTexture('coin',16,16);

    g.clear(); g.fillStyle(0xe74c3c); g.fillCircle(5,5,4); g.fillCircle(11,5,4); g.fillTriangle(1,7,8,15,15,7);
    g.generateTexture('heart',16,16);

    g.clear(); g.fillStyle(0x8B4513); g.fillRect(2,0,4,40); g.fillStyle(0x4caf50); g.fillTriangle(6,2,28,12,6,22);
    g.generateTexture('flag',32,42);

    g.clear(); g.fillStyle(0xffffff,0.15); g.fillRoundedRect(2,2,60,60,14);
    g.lineStyle(2,0xffffff,0.3); g.strokeRoundedRect(2,2,60,60,14);
    g.generateTexture('btn_rect',64,64);

    g.clear(); g.fillStyle(0xffffff,0.15); g.fillCircle(32,32,30);
    g.lineStyle(2,0xffffff,0.3); g.strokeCircle(32,32,30);
    g.generateTexture('btn_circle',64,64);

    g.destroy();

    // Generate 4 individual player frame textures instead of spritesheet
    for(var fi=0;fi<4;fi++){
      var pg=this.make.graphics({add:false});
      pg.fillStyle(0xe74c3c); pg.fillRect(10,16,12,8);
      pg.fillStyle(0xffcc99); pg.fillCircle(16,11,7);
      pg.fillStyle(0x8B4513); pg.fillRect(9,3,14,5);
      pg.fillStyle(0x222222); pg.fillCircle(14,10,1.5); pg.fillCircle(19,10,1.5);
      pg.fillStyle(0xc0392b); pg.fillTriangle(10,16,5-(fi%2)*2,26,12,24);
      pg.fillStyle(0x3498db);
      var flo=fi===1?-1:fi===2?1:0;
      pg.fillRect(11,22,4,6+flo); pg.fillRect(17,22,4,6-flo);
      pg.fillStyle(0x5d4037); pg.fillRect(10,28+flo,5,3); pg.fillRect(17,28-flo,5,3);
      pg.fillStyle(0xf39c12); pg.fillRect(10,21,12,1);
      pg.generateTexture('pf'+fi,32,32);
      pg.destroy();
    }
    this.scene.start('Menu');
  }
}

class MenuScene extends Phaser.Scene {
  constructor(){ super('Menu'); }
  create(){
    var w=this.cameras.main.width, h=this.cameras.main.height;
    var bg=this.add.graphics(); bg.fillGradientStyle(0x1a2a0a,0x2d4a1e,0x87CEEB,0xffb347,1); bg.fillRect(0,0,w,h);
    this.add.rectangle(w/2,h/2,w,h,0x000000,0.3);
    this.add.text(w/2,h*0.18,'🐾 Animal Rescue Run!',{fontSize:Math.min(w*0.06,34)+'px',fontFamily:'Trebuchet MS,sans-serif',color:'#FFD700',fontStyle:'bold',stroke:'#000',strokeThickness:4}).setOrigin(0.5);
    this.add.text(w/2,h*0.32,'Run, jump & rescue animals\nacross 5 amazing worlds!',{fontSize:Math.min(w*0.033,16)+'px',fontFamily:'Trebuchet MS,sans-serif',color:'#fff',align:'center',lineSpacing:6}).setOrigin(0.5);
    ['🌻','🌲','💎','❄️','🌋'].forEach(function(ic,i){ this.add.text(w/2-100+i*50,h*0.45,ic,{fontSize:'22px'}).setOrigin(0.5); }.bind(this));
    var btn=this.add.rectangle(w/2,h*0.6,200,50,0x4caf50).setInteractive({useHandCursor:true});
    btn.setStrokeStyle(3,0x66bb6a);
    this.add.text(w/2,h*0.6,'🎮  START GAME',{fontSize:'18px',fontFamily:'Trebuchet MS,sans-serif',color:'#fff',fontStyle:'bold'}).setOrigin(0.5);
    btn.on('pointerover',function(){btn.setFillStyle(0x66bb6a);});
    btn.on('pointerout',function(){btn.setFillStyle(0x4caf50);});
    var self=this;
    btn.on('pointerup',function(){ self.cameras.main.fadeOut(300,0,0,0); self.time.delayedCall(300,function(){self.scene.start('Game',{level:0,totalScore:0,allRescued:[]});}); });
    this.add.text(w/2,h*0.75,'Arrow Keys / WASD or Touch Controls',{fontSize:'11px',fontFamily:'sans-serif',color:'rgba(255,255,255,0.4)'}).setOrigin(0.5);
    this.cameras.main.fadeIn(400);
  }
}

class GameScene extends Phaser.Scene {
  constructor(){ super('Game'); }
  init(data){ this.levelIndex=data.level||0; this.totalScore=data.totalScore||0; this.allRescued=data.allRescued||[]; }
  create(){
    var lvl=LEVELS[this.levelIndex], w=this.cameras.main.width, h=this.cameras.main.height;
    this.gameW=lvl.length; this.groundY=h-64; this.lvl=lvl; this.gameH=h;
    this.physics.world.setBounds(0,0,this.gameW,h+200);
    var bg=this.add.graphics().setScrollFactor(0);
    bg.fillGradientStyle(lvl.sky,lvl.sky,lvl.dirt,lvl.dirt,1); bg.fillRect(0,0,w,h);

    this.platforms=this.physics.add.staticGroup();
    this.animalGroup=this.physics.add.group();
    this.enemyGroup=this.physics.add.group();
    this.coinGroup=this.physics.add.group();
    this.generateLevel();

    this.player=this.physics.add.sprite(80,this.groundY-48,'pf0').setSize(18,26).setOffset(7,4).setCollideWorldBounds(false).setDepth(10);
    this.player.setGravityY(600);

    this.anims.create({key:'idle',frames:[{key:'pf0'}],frameRate:1});
    this.anims.create({key:'run',frames:[{key:'pf0'},{key:'pf1'},{key:'pf2'},{key:'pf3'}],frameRate:10,repeat:-1});
    this.anims.create({key:'jump',frames:[{key:'pf3'}],frameRate:1});

    this.physics.add.collider(this.player,this.platforms);
    this.physics.add.collider(this.enemyGroup,this.platforms);
    this.physics.add.overlap(this.player,this.animalGroup,this.collectAnimal,null,this);
    this.physics.add.overlap(this.player,this.coinGroup,this.collectCoin,null,this);
    this.physics.add.overlap(this.player,this.enemyGroup,this.hitEnemy,null,this);

    this.cameras.main.setBounds(0,0,this.gameW,h);
    this.cameras.main.startFollow(this.player,true,0.08,0.08);

    this.rescued=0;this.score=0;this.lives=3;this.invincible=false;this.isAlive=true;this.levelComplete=false;

    this.cursors=this.input.keyboard.createCursorKeys();
    this.wasd=this.input.keyboard.addKeys({up:'W',down:'S',left:'A',right:'D',space:'SPACE'});
    this.touchInput={left:false,right:false,jump:false};
    this.createHUD(); this.createTouchControls(); this.cameras.main.fadeIn(400);
  }

  generateLevel(){
    var lvl=this.lvl,gY=this.groundY,li=this.levelIndex,x=0,self=this;
    while(x<this.gameW){
      var segW=160+Math.random()*300, hasGap=x>200&&Math.random()>0.6, gapW=hasGap?64+Math.random()*80:0;
      for(var tx=x;tx<x+segW&&tx<this.gameW;tx+=32){
        this.platforms.create(tx+16,gY+16,'tile_'+li).setDisplaySize(32,32).refreshBody();
        this.add.rectangle(tx+16,gY+48,32,32,LEVELS[li].dirt);
      }
      if(Math.random()>0.4&&x>100){
        var px=x+Math.random()*segW*0.6,py=gY-80-Math.random()*100,pw=3+Math.floor(Math.random()*3);
        for(var i=0;i<pw;i++) this.platforms.create(px+i*32+16,py,'plat_'+li).setDisplaySize(32,16).setSize(32,16).refreshBody();
        if(Math.random()>0.4) this.spawnAnimal(px+pw*16,py-24);
      }
      if(Math.random()>0.5) this.spawnAnimal(x+40+Math.random()*(segW-80),gY-24);
      if(Math.random()>0.3){
        var cc=3+Math.floor(Math.random()*4),cx=x+60+Math.random()*(segW-120);
        for(var ci=0;ci<cc;ci++){var coin=this.coinGroup.create(cx+ci*24,gY-50-Math.sin(ci*0.8)*30,'coin');coin.body.setAllowGravity(false);coin.setImmovable(true);}
      }
      if(x>300&&Math.random()>0.45) this.spawnEnemy(x+60+Math.random()*(segW-120));
      x+=segW+gapW;
    }
    this.flag=this.physics.add.sprite(this.gameW-100,gY-30,'flag');
    this.flag.body.setAllowGravity(false);this.flag.setImmovable(true);
    this.physics.add.overlap(this.player,this.flag,this.reachGoal,null,this);
  }

  spawnAnimal(ax,ay){
    var lvl=this.lvl,idx=Math.floor(Math.random()*lvl.animals.length);
    var animal=this.add.text(ax,ay,lvl.animals[idx],{fontSize:'22px'}).setOrigin(0.5).setDepth(5);
    this.physics.add.existing(animal);animal.body.setAllowGravity(false);animal.body.setSize(20,20);
    animal.setData('name',lvl.animalNames[idx]);this.animalGroup.add(animal);
    this.tweens.add({targets:animal,y:ay-8,duration:1000+Math.random()*500,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
  }

  spawnEnemy(ex){
    var lvl=this.lvl,gY=this.groundY,type=Phaser.Utils.Array.GetRandom(lvl.enemies);
    var enemy=this.physics.add.sprite(ex,type==='bat'?gY-90-Math.random()*40:gY-18,'enemy_'+type);
    enemy.setData('type',type);
    if(type==='bat'){
      enemy.body.setAllowGravity(false);
      this.tweens.add({targets:enemy,x:enemy.x+80,duration:2000,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
      this.tweens.add({targets:enemy,y:enemy.y+20,duration:1500,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    } else { enemy.setVelocityX(Phaser.Math.Between(30,60)*(Math.random()>0.5?1:-1)); }
    this.enemyGroup.add(enemy);
  }

  sparkle(x,y,em){for(var i=0;i<6;i++){var s=this.add.text(x,y,em||'✨',{fontSize:'14px'}).setDepth(50);this.tweens.add({targets:s,x:x+(Math.random()-0.5)*80,y:y-30-Math.random()*50,alpha:0,scale:0.3,duration:500,onComplete:function(){s.destroy();}});}}

  createHUD(){
    var w=this.cameras.main.width;
    this.add.rectangle(w/2,20,w,40,0x000000,0.5).setScrollFactor(0).setDepth(100);
    this.hudLevel=this.add.text(12,8,'Level '+(this.levelIndex+1)+': '+this.lvl.name,{fontSize:'13px',fontFamily:'Trebuchet MS,sans-serif',color:'#fff',fontStyle:'bold'}).setScrollFactor(0).setDepth(101);
    this.hudRescued=this.add.text(w/2,8,'Rescued: 0/'+this.lvl.required,{fontSize:'14px',fontFamily:'sans-serif',color:'#FFD700',fontStyle:'bold'}).setOrigin(0.5,0).setScrollFactor(0).setDepth(101);
    this.hudScore=this.add.text(w-12,8,'Score: 0',{fontSize:'13px',fontFamily:'sans-serif',color:'#7ed957'}).setOrigin(1,0).setScrollFactor(0).setDepth(101);
    this.hearts=[];
    for(var i=0;i<3;i++) this.hearts.push(this.add.image(14+i*22,30,'heart').setScale(1.2).setScrollFactor(0).setDepth(101));
    this.add.rectangle(w/2,40,w-24,4,0x333333,0.6).setScrollFactor(0).setDepth(100);
    this.progBar=this.add.rectangle(12,40,0,4,0x4caf50,1).setOrigin(0,0.5).setScrollFactor(0).setDepth(101);
  }

  createTouchControls(){
    var w=this.cameras.main.width,h=this.cameras.main.height,y=h-50,self=this;
    function makeBtn(bx,key,tex){
      var b=self.add.image(bx,y,tex).setScrollFactor(0).setDepth(200).setAlpha(0.7).setInteractive();
      b.on('pointerdown',function(){self.touchInput[key]=true;});
      b.on('pointerup',function(){self.touchInput[key]=false;});
      b.on('pointerout',function(){self.touchInput[key]=false;});
    }
    makeBtn(60,'left','btn_rect');
    this.add.text(60,y,'◀',{fontSize:'24px',color:'rgba(255,255,255,0.7)'}).setOrigin(0.5).setScrollFactor(0).setDepth(201);
    makeBtn(140,'right','btn_rect');
    this.add.text(140,y,'▶',{fontSize:'24px',color:'rgba(255,255,255,0.7)'}).setOrigin(0.5).setScrollFactor(0).setDepth(201);
    makeBtn(w-60,'jump','btn_circle');
    this.add.text(w-60,y,'JUMP',{fontSize:'12px',fontStyle:'bold',color:'rgba(255,255,255,0.7)'}).setOrigin(0.5).setScrollFactor(0).setDepth(201);
  }

  collectAnimal(player,animal){
    var name=animal.getData('name');
    this.sparkle(animal.x,animal.y,'⭐');animal.destroy();
    this.rescued++;this.score+=150;this.allRescued.push(name);this.updateHUD();
    var txt=this.add.text(player.x,player.y-30,name+' rescued! +150',{fontSize:'12px',fontFamily:'sans-serif',color:'#FFD700',fontStyle:'bold',stroke:'#000',strokeThickness:2}).setOrigin(0.5).setDepth(50);
    this.tweens.add({targets:txt,y:txt.y-40,alpha:0,duration:1200,onComplete:function(){txt.destroy();}});
    if(this.rescued>=this.lvl.required&&!this._flagShown){
      this._flagShown=true;
      var hint=this.add.text(this.cameras.main.scrollX+this.cameras.main.width/2,60,'✅ Enough rescued! Reach the flag! →',{fontSize:'14px',fontFamily:'sans-serif',color:'#7ed957',fontStyle:'bold',stroke:'#000',strokeThickness:3}).setOrigin(0.5).setScrollFactor(0).setDepth(101);
      this.tweens.add({targets:hint,alpha:0,duration:3000,delay:2000,onComplete:function(){hint.destroy();}});
    }
  }

  collectCoin(player,coin){
    coin.destroy();this.score+=25;this.updateHUD();
    var t=this.add.text(coin.x,coin.y,'+25',{fontSize:'10px',color:'#ffd700',fontStyle:'bold',stroke:'#000',strokeThickness:2}).setOrigin(0.5);
    this.tweens.add({targets:t,y:t.y-25,alpha:0,duration:600,onComplete:function(){t.destroy();}});
  }

  hitEnemy(player,enemy){
    if(this.invincible||!this.isAlive)return;
    if(player.body.velocity.y>0&&player.y+player.body.height-10<enemy.y){
      player.setVelocityY(-300);this.score+=100;this.updateHUD();
      this.sparkle(enemy.x,enemy.y,'💥');
      var t=this.add.text(enemy.x,enemy.y-10,'+100',{fontSize:'11px',color:'#ff6b35',fontStyle:'bold',stroke:'#000',strokeThickness:2}).setOrigin(0.5);
      this.tweens.add({targets:t,y:t.y-30,alpha:0,duration:800,onComplete:function(){t.destroy();}});
      enemy.destroy();
    } else {
      this.lives--;this.invincible=true;var self=this;
      player.setVelocityY(-250);player.setVelocityX(-player.flipX?150:-150);
      this.tweens.add({targets:player,alpha:0.3,duration:100,yoyo:true,repeat:8,onComplete:function(){player.setAlpha(1);self.invincible=false;}});
      if(this.lives>=0&&this.lives<this.hearts.length)this.tweens.add({targets:this.hearts[this.lives],alpha:0.2,scale:0.5,duration:300});
      this.cameras.main.shake(200,0.01);
      if(this.lives<=0)this.gameOver();
    }
  }

  reachGoal(){
    if(this.levelComplete)return;
    if(this.rescued<this.lvl.required){
      if(!this._needMore){this._needMore=true;
        var t=this.add.text(this.flag.x,this.flag.y-40,'Need '+(this.lvl.required-this.rescued)+' more!',{fontSize:'12px',color:'#ff6b6b',fontStyle:'bold',stroke:'#000',strokeThickness:2}).setOrigin(0.5).setDepth(50);
        var self=this;this.tweens.add({targets:t,alpha:0,duration:2000,onComplete:function(){t.destroy();self._needMore=false;}});
      }return;
    }
    this.levelComplete=true;this.score+=this.lives*200;this.physics.pause();var self=this;
    for(var i=0;i<10;i++)(function(i){self.time.delayedCall(i*100,function(){self.sparkle(self.player.x-40+Math.random()*80,self.player.y-40+Math.random()*40,'🎉');});})(i);
    this.time.delayedCall(1500,function(){self.cameras.main.fadeOut(500);
      self.time.delayedCall(500,function(){self.scene.start('LevelComplete',{level:self.levelIndex,score:self.score,totalScore:self.totalScore+self.score,rescued:self.rescued,lives:self.lives,allRescued:self.allRescued});});
    });
  }

  gameOver(){
    this.isAlive=false;this.physics.pause();this.player.setTint(0xff0000);var self=this;
    this.cameras.main.shake(300,0.02);
    this.time.delayedCall(1000,function(){self.cameras.main.fadeOut(500);
      self.time.delayedCall(500,function(){self.scene.start('GameOver',{level:self.levelIndex,totalScore:self.totalScore,allRescued:self.allRescued});});
    });
  }

  updateHUD(){
    this.hudRescued.setText('Rescued: '+this.rescued+'/'+this.lvl.required);
    if(this.rescued>=this.lvl.required)this.hudRescued.setColor('#7ed957');
    this.hudScore.setText('Score: '+this.score);
    this.progBar.width=(this.cameras.main.width-24)*Math.min(this.player.x/this.gameW,1);
  }

  update(){
    if(!this.isAlive||this.levelComplete)return;
    var p=this.player,on=p.body.blocked.down;
    var left=this.cursors.left.isDown||this.wasd.left.isDown||this.touchInput.left;
    var right=this.cursors.right.isDown||this.wasd.right.isDown||this.touchInput.right;
    var jump=this.cursors.up.isDown||this.wasd.up.isDown||this.wasd.space.isDown||this.touchInput.jump;
    if(left){p.setVelocityX(-200);p.setFlipX(true);}
    else if(right){p.setVelocityX(200);p.setFlipX(false);}
    else p.setVelocityX(p.body.velocity.x*0.85);
    if(jump&&on)p.setVelocityY(-420);
    if(!jump&&p.body.velocity.y<-100)p.setVelocityY(p.body.velocity.y*0.9);
    if(!on)p.anims.play('jump',true);
    else if(Math.abs(p.body.velocity.x)>20)p.anims.play('run',true);
    else p.anims.play('idle',true);
    if(p.y>this.gameH+100){
      this.lives--;
      if(this.lives>=0&&this.lives<this.hearts.length)this.tweens.add({targets:this.hearts[this.lives],alpha:0.2,scale:0.5,duration:300});
      if(this.lives<=0){this.gameOver();return;}
      p.setPosition(Math.max(this.cameras.main.scrollX+80,80),this.groundY-60);p.setVelocity(0,0);
      this.invincible=true;var self=this;
      this.tweens.add({targets:p,alpha:0.3,duration:100,yoyo:true,repeat:8,onComplete:function(){p.setAlpha(1);self.invincible=false;}});
    }
    this.updateHUD();
  }
}

class LevelCompleteScene extends Phaser.Scene {
  constructor(){super('LevelComplete');}
  init(data){this.d=data;}
  create(){
    var w=this.cameras.main.width,h=this.cameras.main.height,d=this.d;
    this.add.rectangle(w/2,h/2,w,h,0x0a1628);
    this.add.text(w/2,h*0.15,'🎉',{fontSize:'48px'}).setOrigin(0.5);
    this.add.text(w/2,h*0.28,'Level Complete!',{fontSize:'28px',fontFamily:'Trebuchet MS,sans-serif',color:'#7ed957',fontStyle:'bold'}).setOrigin(0.5);
    this.add.text(w/2,h*0.38,LEVELS[d.level].name+' cleared!',{fontSize:'15px',color:'rgba(255,255,255,0.7)'}).setOrigin(0.5);
    var stars=d.lives>=3?3:d.lives>=2?2:1;
    for(var i=0;i<3;i++)this.add.text(w/2-40+i*40,h*0.48,'⭐',{fontSize:'28px'}).setOrigin(0.5).setAlpha(i<stars?1:0.2);
    this.add.text(w/2,h*0.58,'+'+d.score+' points',{fontSize:'22px',color:'#FFD700',fontStyle:'bold'}).setOrigin(0.5);
    var isLast=d.level+1>=LEVELS.length;
    var btn=this.add.rectangle(w/2,h*0.73,200,48,0x4caf50).setInteractive({useHandCursor:true});
    btn.setStrokeStyle(2,0x66bb6a);
    this.add.text(w/2,h*0.73,isLast?'🏆  See Results':'Next World  →',{fontSize:'16px',color:'#fff',fontStyle:'bold'}).setOrigin(0.5);
    var self=this;
    btn.on('pointerup',function(){self.cameras.main.fadeOut(300);self.time.delayedCall(300,function(){
      if(isLast)self.scene.start('Victory',{totalScore:d.totalScore,allRescued:d.allRescued});
      else self.scene.start('Game',{level:d.level+1,totalScore:d.totalScore,allRescued:d.allRescued});
    });});
    this.cameras.main.fadeIn(400);
  }
}

class GameOverScene extends Phaser.Scene {
  constructor(){super('GameOver');}
  init(data){this.d=data;}
  create(){
    var w=this.cameras.main.width,h=this.cameras.main.height,d=this.d;
    this.add.rectangle(w/2,h/2,w,h,0x1a0a0a);
    this.add.text(w/2,h*0.2,'😢',{fontSize:'48px'}).setOrigin(0.5);
    this.add.text(w/2,h*0.34,'Game Over',{fontSize:'28px',fontFamily:'Trebuchet MS,sans-serif',color:'#ff6b6b',fontStyle:'bold'}).setOrigin(0.5);
    this.add.text(w/2,h*0.44,'The animals still need your help!',{fontSize:'14px',color:'rgba(255,255,255,0.6)'}).setOrigin(0.5);
    var self=this;
    var retry=this.add.rectangle(w/2-70,h*0.6,120,44,0xff6b35).setInteractive({useHandCursor:true});
    this.add.text(w/2-70,h*0.6,'🔄 Retry',{fontSize:'15px',color:'#fff',fontStyle:'bold'}).setOrigin(0.5);
    retry.on('pointerup',function(){self.scene.start('Game',{level:d.level,totalScore:d.totalScore,allRescued:d.allRescued});});
    var menu=this.add.rectangle(w/2+70,h*0.6,120,44,0x333333).setInteractive({useHandCursor:true});
    menu.setStrokeStyle(2,0x555555);
    this.add.text(w/2+70,h*0.6,'🏠 Menu',{fontSize:'15px',color:'#fff',fontStyle:'bold'}).setOrigin(0.5);
    menu.on('pointerup',function(){self.scene.start('Menu');});
    this.cameras.main.fadeIn(400);
  }
}

class VictoryScene extends Phaser.Scene {
  constructor(){super('Victory');}
  init(data){this.d=data;}
  create(){
    var w=this.cameras.main.width,h=this.cameras.main.height,d=this.d;
    this.add.rectangle(w/2,h/2,w,h,0x0a1628);
    this.add.text(w/2,h*0.12,'🏆',{fontSize:'52px'}).setOrigin(0.5);
    this.add.text(w/2,h*0.25,'WILDLIFE HERO!',{fontSize:'30px',fontFamily:'Trebuchet MS,sans-serif',color:'#FFD700',fontStyle:'bold',stroke:'#000',strokeThickness:3}).setOrigin(0.5);
    this.add.text(w/2,h*0.35,'All 5 worlds completed!',{fontSize:'14px',color:'rgba(255,255,255,0.7)'}).setOrigin(0.5);
    this.add.text(w/2,h*0.45,'Final Score: '+d.totalScore,{fontSize:'24px',color:'#FFD700',fontStyle:'bold'}).setOrigin(0.5);
    var unique=[],seen={};d.allRescued.forEach(function(n){if(!seen[n]){seen[n]=true;unique.push(n);}});
    var emojis={Bunny:'🐰',Fox:'🦊',Bird:'🐦',Cat:'🐱',Frog:'🐸',Panda:'🐼',Penguin:'🐧',Parrot:'🦜'};
    unique.forEach(function(name,i){
      var e=emojis[name]||'🐾';
      var t=this.add.text(w/2-unique.length*16+i*36,h*0.58,e,{fontSize:'24px'}).setOrigin(0.5);
      this.tweens.add({targets:t,y:t.y-6,duration:800+i*100,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
    }.bind(this));
    var conf=['🎉','⭐','🌟','✨','💛'];var self=this;
    for(var i=0;i<30;i++)(function(i){self.time.delayedCall(i*120,function(){
      var s=self.add.text(Math.random()*w,-20,Phaser.Utils.Array.GetRandom(conf),{fontSize:'18px'});
      self.tweens.add({targets:s,y:h+20,x:s.x+(Math.random()-0.5)*80,rotation:Math.random()*4,duration:2500+Math.random()*1500,onComplete:function(){s.destroy();}});
    });})(i);
    var btn=this.add.rectangle(w/2,h*0.75,200,48,0x4caf50).setInteractive({useHandCursor:true});
    btn.setStrokeStyle(2,0x66bb6a);
    this.add.text(w/2,h*0.75,'🔄  Play Again',{fontSize:'16px',color:'#fff',fontStyle:'bold'}).setOrigin(0.5);
    btn.on('pointerup',function(){self.scene.start('Menu');});
    this.cameras.main.fadeIn(500);
  }
}

new Phaser.Game({
  type:Phaser.AUTO, parent:'game-container',
  scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH,width:800,height:450},
  physics:{default:'arcade',arcade:{gravity:{y:0},debug:false}},
  pixelArt:true, scene:[BootScene,MenuScene,GameScene,LevelCompleteScene,GameOverScene,VictoryScene],
  input:{activePointers:3}
});
